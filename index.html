<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blinkit Clone</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->
    <header class="header">

        <div class="logo">
            <h2>Blinkit</h2>
        </div>

        <div class="search">
            <input type="text" placeholder="Search for products">
        </div>

        <div class="menu">
            <button>Login</button>
            <button>My Cart</button>
        </div>

    </header>

    <!-- Delivery -->
    <section class="location">

        <h3>Delivery in 10 minutes</h3>
        <p>Home - 110001</p>

    </section>

    <!-- Banner -->
    <section class="banner">

        <h1>Groceries delivered in 10 minutes</h1>

        <p>Fresh Fruits | Vegetables | Dairy | Snacks</p>

        <button>Shop Now</button>

    </section>

    <!-- Categories -->
    <section class="categories">

        <div class="box">Fruits</div>
        <div class="box">Vegetables</div>
        <div class="box">Dairy</div>
        <div class="box">Snacks</div>
        <div class="box">Drinks</div>
        <div class="box">Bakery</div>

    </section>

    <!-- Products -->
    <section class="products">

        <div class="card">
            <img src="images/freshbanana.jpg" alt="Banana">
            <h3>Banana</h3>
            <p>₹30</p>
            <button>Add</button>
        </div>

        <div class="card">
            <img src="images/freshmilk.jpg" alt="Milk">
            <h3>Milk</h3>
            <p>₹65</p>
            <button>Add</button>
        </div>

        <div class="card">
            <img src="images/freshlays.jpg" alt="Lays">
            <h3>Lays</h3>
            <p>₹20</p>
            <button>Add</button>
        </div>

        <div class="card">
            <img src="images/freshtomato.jpg" alt="Tomato">
            <h3>Tomato</h3>
            <p>₹40</p>
            <button>Add</button>
        
        </div>

    </section>

</body>

</html>
